<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bảo trì hệ thống</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f1eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    .maintenance-wrapper {
      width: 100%;
      max-width: 1280px;
      background: #ffffff;
      border-radius: 28px;
      overflow: hidden;
      display: flex;
      min-height: 680px;
      box-shadow:
        0 20px 60px rgba(0,0,0,0.08),
        0 8px 20px rgba(0,0,0,0.04);
      position: relative;
    }

    /* LEFT */
    .maintenance-content {
      width: 48%;
      padding: 80px 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      z-index: 2;
      background: #fff;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #fff4ea;
      color: #ff8a00;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 28px;
      width: fit-content;
    }

    .title {
      font-size: 52px;
      line-height: 1.15;
      color: #121212;
      font-weight: 700;
      margin-bottom: 24px;
    }

    .description {
      font-size: 18px;
      line-height: 1.8;
      color: #6f6f6f;
      max-width: 520px;
      margin-bottom: 40px;
    }

    /* RIGHT */
    .maintenance-image {
      width: 52%;
      position: relative;
      background:
        radial-gradient(circle at top right, #f5efe6 0%, #f5efe6 25%, transparent 26%),
        radial-gradient(circle at bottom right, #f7f4ee 0%, #f7f4ee 35%, transparent 36%),
        #f9f7f3;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 40px;
    }

    .maintenance-image svg {
      height: 100px;
    }

    .footer-note {
      position: absolute;
      bottom: 30px;
      left: 60px;
      font-size: 14px;
      color: #9c9c9c;
    }

    /* Tablet */
    @media (max-width: 992px) {
      .maintenance-wrapper {
        flex-direction: column-reverse;
        min-height: auto;
      }

      .maintenance-content,
      .maintenance-image {
        width: 100%;
      }

      .maintenance-image {
        min-height: 420px;
        padding: 40px 30px 0;
      }

      .maintenance-content {
        padding: 50px 32px 60px;
        text-align: center;
        align-items: center;
      }

      .title {
        font-size: 42px;
      }

      .description {
        max-width: 100%;
      }

      .footer-note {
        position: static;
        margin-top: 40px;
      }
    }

    /* Mobile */
    @media (max-width: 576px) {
      body {
        padding: 16px;
      }

      .maintenance-wrapper {
        border-radius: 22px;
      }

      .maintenance-content {
        padding: 36px 24px 44px;
      }

      .maintenance-image {
        min-height: 320px;
        padding: 24px 20px 0;
      }

      .title {
        font-size: 30px;
      }

      .description {
        font-size: 15px;
        line-height: 1.7;
      }

      .maintenance-image img {
        max-width: 100%;
      }
    }
  </style>
</head>

<body>

  <section class="maintenance-wrapper">

    <!-- LEFT CONTENT -->
    <div class="maintenance-content">

      <div class="badge">
        ⚡ Hệ thống đang bảo trì
      </div>

      <h1 class="title">
        Website đang được nâng cấp và bảo trì
      </h1>

      <p class="description">
        Chúng tôi đang thực hiện cập nhật hệ thống để mang lại trải nghiệm mua sắm tốt hơn,
        tốc độ nhanh hơn và giao diện hiện đại hơn cho khách hàng.
      </p>

      <div class="footer-note">
        © Power by Babanana
      </div>

    </div>
